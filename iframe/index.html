<!doctype html>
<html lang="zh-Hans">
	<head>
		<title>PCB灯光画</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<style>
			:root {
				color-scheme: light;
				--bg: #0b1220;
				--panel: #111a2e;
				--text: #e5e7eb;
				--muted: #a8b3cf;
				--border: rgba(255, 255, 255, 0.12);
				--btn: #2563eb;
				--btn2: #1f2937;
				--danger: #ef4444;
				--ok: #16a34a;
			}
			body {
				margin: 0;
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
					Arial, sans-serif;
				background: radial-gradient(1200px 700px at 10% 0%, #14203d 0%, var(--bg) 60%);
				color: var(--text);
			}
			.container {
				padding: 14px;
				max-width: 1360px;
				margin: 0 auto;
			}
			.header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 12px;
				margin-bottom: 12px;
			}
			.h-title {
				font-size: 16px;
				font-weight: 700;
				margin: 0;
			}
			.h-sub {
				margin: 4px 0 0;
				color: var(--muted);
				font-size: 12px;
			}
			.panel {
				background: rgba(17, 26, 46, 0.85);
				border: 1px solid var(--border);
				border-radius: 12px;
				padding: 12px;
			}
			.panel-title {
				display: flex;
				align-items: baseline;
				justify-content: space-between;
				gap: 12px;
				margin-bottom: 10px;
			}
			.panel-title h2 {
				margin: 0;
				font-size: 13px;
			}
			.row {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 12px;
			}
			@media (max-width: 960px) {
				.row {
					grid-template-columns: 1fr;
				}
			}
			.controls {
				display: flex;
				flex-wrap: wrap;
				align-items: center;
				gap: 10px 12px;
			}
			.group {
				display: flex;
				flex-wrap: wrap;
				align-items: center;
				gap: 8px;
			}
			.sep {
				height: 22px;
				width: 1px;
				background: var(--border);
			}
			.btn {
				border: 0;
				border-radius: 10px;
				padding: 8px 10px;
				cursor: pointer;
				background: var(--btn);
				color: white;
				font-weight: 600;
				font-size: 12px;
			}
			.btn.secondary {
				background: var(--btn2);
				border: 1px solid var(--border);
			}
			.btn.ok {
				background: var(--ok);
			}
			.btn.danger {
				background: var(--danger);
			}
			.btn:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}
			.meta {
				color: var(--muted);
				font-size: 12px;
			}
			input[type='number'],
			input[type='text'] {
				background: rgba(0, 0, 0, 0.2);
				border: 1px solid var(--border);
				color: var(--text);
				border-radius: 8px;
				padding: 6px 8px;
				outline: none;
				font-size: 12px;
			}
			input[type='range'] {
				accent-color: var(--btn);
			}
			label.small {
				display: inline-flex;
				align-items: center;
				gap: 6px;
			}
			.canvas-wrap {
				position: relative;
				border: 1px solid var(--border);
				border-radius: 12px;
				overflow: hidden;
				background: rgba(0, 0, 0, 0.2);
			}
			.canvas-wrap header {
				display: flex;
				align-items: baseline;
				justify-content: space-between;
				padding: 10px 10px 0;
			}
			.canvas-wrap h2 {
				margin: 0;
				font-size: 13px;
			}
			.canvas-wrap .hint {
				color: var(--muted);
				font-size: 12px;
			}
			canvas {
				display: block;
				width: 100%;
				height: auto;
			}
			.stage {
				position: relative;
				padding: 10px;
			}
			.stage canvas.overlay {
				position: absolute;
				left: 10px;
				top: 10px;
				pointer-events: none;
			}
			.toolbar {
				display: flex;
				flex-wrap: wrap;
				align-items: center;
				gap: 8px 10px;
				padding: 10px;
				border-top: 1px solid var(--border);
				background: rgba(0, 0, 0, 0.15);
			}
			.pickers {
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
			}
			.picker {
				width: 22px;
				height: 22px;
				border-radius: 999px;
				border: 2px solid rgba(255, 255, 255, 0.6);
				cursor: pointer;
				box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.25);
			}
			.picker.selected {
				border-color: white;
				box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.8);
			}
			.small {
				font-size: 12px;
				color: var(--muted);
			}
			.thumbs {
				display: flex;
				flex-wrap: wrap;
				gap: 10px;
			}
			.thumb {
				width: 96px;
				height: 96px;
				border-radius: 10px;
				border: 1px solid var(--border);
				overflow: hidden;
				background: rgba(0, 0, 0, 0.2);
				cursor: pointer;
			}
			.thumb img {
				width: 100%;
				height: 100%;
				object-fit: cover;
				display: block;
			}
			.toast {
				position: fixed;
				right: 16px;
				bottom: 16px;
				padding: 10px 12px;
				border-radius: 12px;
				border: 1px solid var(--border);
				background: rgba(17, 26, 46, 0.92);
				color: var(--text);
				font-size: 12px;
				opacity: 0;
				transform: translateY(8px);
				transition:
					opacity 160ms ease,
					transform 160ms ease;
				pointer-events: none;
				max-width: 420px;
			}
			.toast.show {
				opacity: 1;
				transform: translateY(0);
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="header">
				<div>
					<p class="h-title">PCB灯光画 · 工作台</p>
					<p class="h-sub">上传图片 → 编辑原图 → 量化简化图 → 编辑简化图 → 生成遮罩/图层/预览 → 保存导出</p>
				</div>
				<div class="meta" id="meta"></div>
			</div>

			<div class="panel" style="margin-bottom: 12px">
				<div class="controls">
					<div class="group">
						<input id="file" type="file" accept="image/*" />
						<button id="btnClear" class="btn secondary">清空</button>
					</div>
					<div class="sep"></div>
					<div class="group">
						<span class="small">主色系：</span>
						<label class="small"><input type="radio" name="scheme" value="blue" checked /> 蓝</label>
						<label class="small"><input type="radio" name="scheme" value="red" /> 红</label>
						<label class="small"><input type="radio" name="scheme" value="purple" /> 紫</label>
					</div>
					<div class="sep"></div>
					<div class="group">
						<button id="btnGenerate" class="btn ok" disabled>生成遮罩/图层</button>
						<input id="pcbWmm" type="number" min="1" step="0.1" value="85" style="width: 90px" />
						<span class="small">×</span>
						<input id="pcbHmm" type="number" min="1" step="0.1" value="50" style="width: 90px" />
						<span class="small">mm</span>
						<button id="btnBuildPcbArt" class="btn ok" disabled>一键生成PCB画</button>
						<input id="exportPrefix" type="text" placeholder="导出文件名前缀（可选）" style="width: 220px" />
						<button id="btnSaveAll" class="btn" disabled>导出ZIP</button>
					</div>
					<span class="meta" id="imgInfo"></span>
				</div>
				<div class="pickers" id="schemeColors"></div>
			</div>

			<div class="row">
				<section class="canvas-wrap">
					<header>
						<h2>原图</h2>
						<span class="hint">工具：画笔/套索/填充（容差仅原图生效）</span>
					</header>
					<div class="stage">
						<canvas id="originalCanvas"></canvas>
						<canvas id="originalPath" class="overlay"></canvas>
					</div>
					<div class="toolbar">
						<div class="group">
							<button id="originalBrushBtn" class="btn secondary">画笔</button>
							<button id="originalLassoBtn" class="btn secondary">套索</button>
							<button id="originalFillBtn" class="btn secondary">填充</button>
						</div>
						<div class="sep"></div>
						<div class="group">
							<span class="small">容差</span>
							<input id="tolerance" type="range" min="0" max="100" value="30" />
							<span class="small" id="toleranceValue">30</span>
						</div>
						<div class="sep"></div>
						<div class="group">
							<span class="small">区域</span>
							<input id="brushSizeOriginal" type="number" min="1" max="200" value="1" style="width: 70px" />
							<button id="undoOriginal" class="btn secondary" disabled>撤销</button>
							<button id="resetOriginal" class="btn secondary" disabled>重置</button>
						</div>
						<div class="sep"></div>
						<div class="group pickers" id="availableColorsOriginal"></div>
					</div>
				</section>
				<section class="canvas-wrap">
					<header>
						<h2>简化图（固定调色板量化）</h2>
						<span class="hint">基于原图当前状态重新量化</span>
					</header>
					<div class="stage">
						<canvas id="simplifiedCanvas"></canvas>
						<canvas id="simplifiedPath" class="overlay"></canvas>
					</div>
					<div class="toolbar">
						<div class="group">
							<button id="simplifiedBrushBtn" class="btn secondary">画笔</button>
							<button id="simplifiedLassoBtn" class="btn secondary">套索</button>
							<button id="simplifiedFillBtn" class="btn secondary">填充</button>
						</div>
						<div class="sep"></div>
						<div class="group">
							<span class="small">区域</span>
							<input id="brushSizeSimplified" type="number" min="1" max="200" value="1" style="width: 70px" />
							<button id="undoSimplified" class="btn secondary" disabled>撤销</button>
							<button id="resetSimplified" class="btn secondary" disabled>重置</button>
						</div>
						<div class="sep"></div>
						<div class="group pickers" id="availableColorsSimplified"></div>
					</div>
				</section>
			</div>

			<div class="row" style="margin-top: 12px">
				<section class="panel">
					<div class="panel-title">
						<h2>遮罩（点击缩略图可单独保存）</h2>
						<span class="meta" id="maskInfo"></span>
					</div>
					<div id="masks" class="thumbs"></div>
				</section>
				<section class="panel">
					<div class="panel-title">
						<h2>图层（点击缩略图可单独保存）</h2>
						<span class="meta" id="layerInfo"></span>
					</div>
					<div id="layers" class="thumbs"></div>
				</section>
			</div>
			<div class="panel" style="margin-top: 12px">
				<div class="panel-title">
					<h2>实物预览（点击缩略图可单独保存）</h2>
					<span class="meta" id="previewInfo"></span>
				</div>
				<div id="preview" class="thumbs"></div>
				<canvas id="previewCanvas" style="display: none"></canvas>
			</div>
		</div>

		<div id="toast" class="toast"></div>

		<script>
			const COLOR_SCHEMES = {
				blue: {
					'深蓝': [22, 31, 125],
					'浅蓝': [93, 167, 227],
					'深绿': [25, 53, 34],
					'浅绿': [249, 225, 149],
					'黑色': [6, 16, 8],
					'白色': [230, 234, 235],
				},
				red: {
					'深红': [125, 22, 22],
					'浅红': [227, 93, 93],
					'深绿': [25, 53, 34],
					'浅绿': [249, 225, 149],
					'黑色': [6, 16, 8],
					'白色': [230, 234, 235],
				},
				purple: {
					'深紫': [125, 22, 125],
					'浅紫': [227, 93, 227],
					'深绿': [25, 53, 34],
					'浅绿': [249, 225, 149],
					'黑色': [6, 16, 8],
					'白色': [230, 234, 235],
				},
			};

			const REPLACE_COLORS = {
				'深蓝': [22, 31, 125],
				'浅蓝': [93, 167, 227],
				'深绿': [25, 53, 34],
				'浅绿': [249, 225, 149],
				'黑色': [6, 16, 8],
				'白色': [230, 234, 235],
				'深紫': [125, 22, 125],
				'浅紫': [227, 93, 227],
				'深红': [125, 22, 22],
				'浅红': [227, 93, 93],
			};

			const RENAME_MAP = {
				'正面铜皮层': '放在顶层',
				'白色': '放在顶层丝印层',
				'正面阻焊层': '放在顶层阻焊层',
				'深蓝': '放在底层注意镜像',
				'深红': '放在底层注意镜像',
				'深紫': '放在底层注意镜像',
				'背面阻焊层': '放在底层阻焊层注意镜像',
			};

			function canvasToBlob(canvas, type) {
				return new Promise((resolve) => canvas.toBlob((b) => resolve(b), type || 'image/png'));
			}

			const BUILD_PCB_ART_MAX_SIDE_TRIAL = 1400;
			const AUTO_DEBORDER_TRIAL = {
				enabled: true,
				maxScanPx: 120,
				rowDominance: 0.9,
				colDominance: 0.9,
				minBorderPx: 10,
			};

			const HOST_TARGET_ORIGIN = (() => {
				const origin = window.location.origin;
				return origin && origin !== 'null' ? origin : '*';
			})();
			const BRIDGE_TOKEN = (() => {
				const token = new URLSearchParams(window.location.search).get('bridgeToken');
				return token || '';
			})();
			const HOST_ACK_TIMEOUT_MS = 20_000;
			const pendingHostRequests = new Map();
			let bridgeToastTimer = 0;

			function showBridgeToast(message, duration) {
				const toast = document.getElementById('toast');
				if (!toast) return;
				if (bridgeToastTimer) window.clearTimeout(bridgeToastTimer);
				toast.textContent = message;
				toast.classList.add('show');
				bridgeToastTimer = window.setTimeout(() => toast.classList.remove('show'), duration || 1800);
			}

			function createRequestId() {
				return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
			}

			function trackHostRequest(requestId, label) {
				const timeoutId = window.setTimeout(() => {
					if (!pendingHostRequests.has(requestId)) return;
					pendingHostRequests.delete(requestId);
					showBridgeToast(`${label}超时，请重试`, 3000);
				}, HOST_ACK_TIMEOUT_MS);
				pendingHostRequests.set(requestId, { label, timeoutId });
			}

			function clearHostRequest(requestId) {
				const pending = pendingHostRequests.get(requestId);
				if (!pending) return null;
				window.clearTimeout(pending.timeoutId);
				pendingHostRequests.delete(requestId);
				return pending;
			}

			function postToHost(payload) {
				const message = BRIDGE_TOKEN ? { ...payload, bridgeToken: BRIDGE_TOKEN } : payload;
				window.parent.postMessage(message, HOST_TARGET_ORIGIN);
			}

			function saveFileToHost(blob, fileName) {
				if (!blob) return undefined;
				const requestId = createRequestId();
				trackHostRequest(requestId, fileName ? `保存 ${fileName}` : '保存文件');
				postToHost({ type: 'pcb-light-paint:saveFileV2', fileName, blob, requestId });
				return requestId;
			}

			function saveZipToHost(zipFileName, files) {
				const requestId = createRequestId();
				trackHostRequest(requestId, zipFileName ? `导出 ${zipFileName}` : '导出ZIP');
				postToHost({ type: 'pcb-light-paint:saveZipV2', zipFileName, files, requestId });
				return requestId;
			}

			function requestBuildPcbArtToHost(payload) {
				const requestId = createRequestId();
				trackHostRequest(requestId, '生成PCB画');
				postToHost({ type: 'pcb-light-paint:buildPcbArtV1', requestId, ...payload });
				return requestId;
			}

			window.addEventListener('message', (event) => {
				if (event.source !== window.parent) return;
				if (HOST_TARGET_ORIGIN !== '*' && event.origin !== HOST_TARGET_ORIGIN) return;
				const data = event.data;
				if (!data || typeof data !== 'object') return;
				if (data.type !== 'pcb-light-paint:ackV1') return;
				if (BRIDGE_TOKEN && data.bridgeToken !== BRIDGE_TOKEN) return;

				const requestId = typeof data.requestId === 'string' ? data.requestId : '';
				const pending = requestId ? clearHostRequest(requestId) : null;
				const requestLabel = pending?.label || '操作';

				const message =
					typeof data.message === 'string' && data.message
						? data.message
						: data.ok === true
							? `${requestLabel}成功`
							: `${requestLabel}失败`;
				showBridgeToast(message, data.ok === true ? 1800 : 2800);
			});

			window.addEventListener('beforeunload', () => {
				for (const pending of pendingHostRequests.values()) {
					window.clearTimeout(pending.timeoutId);
				}
				pendingHostRequests.clear();
			});

			function getDeepColorRGBBySchemeKey(schemeKey) {
				if (schemeKey === 'red') return [125, 22, 22];
				if (schemeKey === 'purple') return [125, 22, 125];
				return [22, 31, 125];
			}

			function calcExactColorRatioOfRow(data, w, y, target) {
				let matched = 0;
				for (let x = 0; x < w; x++) {
					const i = (y * w + x) * 4;
					if (data[i] === target[0] && data[i + 1] === target[1] && data[i + 2] === target[2] && data[i + 3] > 0) {
						matched++;
					}
				}
				return matched / w;
			}

			function calcExactColorRatioOfCol(data, w, h, x, target) {
				let matched = 0;
				for (let y = 0; y < h; y++) {
					const i = (y * w + x) * 4;
					if (data[i] === target[0] && data[i + 1] === target[1] && data[i + 2] === target[2] && data[i + 3] > 0) {
						matched++;
					}
				}
				return matched / h;
			}

			function detectAutoDeborderRect(simplifiedCanvas, schemeKey, options) {
				const w = simplifiedCanvas?.width || 0;
				const h = simplifiedCanvas?.height || 0;
				if (!w || !h) return null;
				const ctx = simplifiedCanvas.getContext('2d', { willReadFrequently: true });
				if (!ctx) return null;
				const imageData = ctx.getImageData(0, 0, w, h);
				const data = imageData.data;
				const target = getDeepColorRGBBySchemeKey(schemeKey);

				const maxScanTopBottom = Math.min(options.maxScanPx, Math.floor(h / 3));
				const maxScanLeftRight = Math.min(options.maxScanPx, Math.floor(w / 3));

				let top = 0;
				while (top < maxScanTopBottom && calcExactColorRatioOfRow(data, w, top, target) >= options.rowDominance) top++;
				let bottom = 0;
				while (bottom < maxScanTopBottom && calcExactColorRatioOfRow(data, w, h - 1 - bottom, target) >= options.rowDominance) bottom++;
				let left = 0;
				while (left < maxScanLeftRight && calcExactColorRatioOfCol(data, w, h, left, target) >= options.colDominance) left++;
				let right = 0;
				while (right < maxScanLeftRight && calcExactColorRatioOfCol(data, w, h, w - 1 - right, target) >= options.colDominance) right++;

				if (top < options.minBorderPx || bottom < options.minBorderPx || left < options.minBorderPx || right < options.minBorderPx) {
					return null;
				}

				const sw = w - left - right;
				const sh = h - top - bottom;
				if (sw <= 0 || sh <= 0) return null;
				if (sw < Math.floor(w * 0.5) || sh < Math.floor(h * 0.5)) return null;
				return { sx: left, sy: top, sw, sh, top, bottom, left, right };
			}

			function cropCanvasByRect(srcCanvas, rect) {
				if (!rect) return srcCanvas;
				const outCanvas = document.createElement('canvas');
				outCanvas.width = rect.sw;
				outCanvas.height = rect.sh;
				const outCtx = outCanvas.getContext('2d');
				if (!outCtx) return srcCanvas;
				outCtx.drawImage(srcCanvas, rect.sx, rect.sy, rect.sw, rect.sh, 0, 0, rect.sw, rect.sh);
				return outCanvas;
			}

			function scaleCanvasToMaxSide(srcCanvas, maxSide) {
				const w = srcCanvas.width || 0;
				const h = srcCanvas.height || 0;
				if (!w || !h) return { canvas: srcCanvas, width: w, height: h };
				const scale = Math.min(1, maxSide / Math.max(w, h));
				if (scale >= 1) return { canvas: srcCanvas, width: w, height: h };
				const tw = Math.max(1, Math.round(w * scale));
				const th = Math.max(1, Math.round(h * scale));
				const tmp = document.createElement('canvas');
				tmp.width = tw;
				tmp.height = th;
				const ctx = tmp.getContext('2d');
				if (!ctx) return { canvas: srcCanvas, width: w, height: h };
				ctx.drawImage(srcCanvas, 0, 0, tw, th);
				return { canvas: tmp, width: tw, height: th };
			}

			function toBinaryMaskCanvas(srcCanvas) {
				const w = srcCanvas.width || 0;
				const h = srcCanvas.height || 0;
				if (!w || !h) return srcCanvas;
				const srcCtx = srcCanvas.getContext('2d');
				if (!srcCtx) return srcCanvas;
				const src = srcCtx.getImageData(0, 0, w, h);
				const outCanvas = document.createElement('canvas');
				outCanvas.width = w;
				outCanvas.height = h;
				const outCtx = outCanvas.getContext('2d');
				if (!outCtx) return srcCanvas;
				const out = outCtx.createImageData(w, h);
				for (let i = 0; i < src.data.length; i += 4) {
					const a = src.data[i + 3];
					if (a > 0) {
						out.data[i] = 0;
						out.data[i + 1] = 0;
						out.data[i + 2] = 0;
						out.data[i + 3] = 255;
					} else {
						out.data[i] = 255;
						out.data[i + 1] = 255;
						out.data[i + 2] = 255;
						out.data[i + 3] = 255;
					}
				}
				const setWhite = (x, y) => {
					if (x < 0 || x >= w || y < 0 || y >= h) return;
					const idx = (y * w + x) * 4;
					out.data[idx] = 255;
					out.data[idx + 1] = 255;
					out.data[idx + 2] = 255;
					out.data[idx + 3] = 255;
				};
				setWhite(0, 0);
				setWhite(w - 1, 0);
				setWhite(0, h - 1);
				setWhite(w - 1, h - 1);
				outCtx.putImageData(out, 0, 0);
				return outCanvas;
			}

			function get2d(canvas) {
				if (!canvas) throw new Error('Canvas节点不存在');
				const ctx = canvas.getContext('2d');
				if (!ctx) throw new Error('无法获取Canvas 2D上下文');
				return ctx;
			}

			class PCBImageProcessor {
				constructor() {
					this.image = null;
					this.originalBaseImage = null;

					this.currentColorScheme = COLOR_SCHEMES.blue;

					this.originalEditHistory = [];
					this.simplifiedEditHistory = [];
					this.maskList = [];
					this.selectedOriginalColor = null;
					this.selectedSimplifiedColor = null;
					this.currentTolerance = 30;
					this.brushSizeOriginal = 1;
					this.brushSizeSimplified = 1;
					this.originalTool = 'brush';
					this.simplifiedTool = 'brush';
					this.isDrawingLassoOriginal = false;
					this.isDrawingLassoSimplified = false;
					this.lassoPointsOriginal = [];
					this.lassoPointsSimplified = [];
					this.toastTimer = null;
					this.initElements();

					this.renderSchemePickers();

				initElements() {

					this.btnSaveAll = document.getElementById('btnSaveAll');
					this.exportPrefixEl = document.getElementById('exportPrefix');
					this.pcbWmmEl = document.getElementById('pcbWmm');
					this.pcbHmmEl = document.getElementById('pcbHmm');

					this.schemeColorsEl = document.getElementById('schemeColors');

					this.originalCanvas = document.getElementById('originalCanvas');
					this.originalPath = document.getElementById('originalPath');
					this.simplifiedCanvas = document.getElementById('simplifiedCanvas');
					this.simplifiedPath = document.getElementById('simplifiedPath');

					this.toleranceEl = document.getElementById('tolerance');
					this.toleranceValueEl = document.getElementById('toleranceValue');
					this.brushSizeOriginalEl = document.getElementById('brushSizeOriginal');
					this.brushSizeSimplifiedEl = document.getElementById('brushSizeSimplified');

					this.originalBrushBtn = document.getElementById('originalBrushBtn');
					this.originalLassoBtn = document.getElementById('originalLassoBtn');
					this.originalFillBtn = document.getElementById('originalFillBtn');
					this.undoOriginalBtn = document.getElementById('undoOriginal');
					this.resetOriginalBtn = document.getElementById('resetOriginal');

					this.simplifiedBrushBtn = document.getElementById('simplifiedBrushBtn');
					this.simplifiedLassoBtn = document.getElementById('simplifiedLassoBtn');
					this.simplifiedFillBtn = document.getElementById('simplifiedFillBtn');
					this.undoSimplifiedBtn = document.getElementById('undoSimplified');
					this.resetSimplifiedBtn = document.getElementById('resetSimplified');

					this.availableColorsOriginalEl = document.getElementById('availableColorsOriginal');
					this.availableColorsSimplifiedEl = document.getElementById('availableColorsSimplified');

					this.masksEl = document.getElementById('masks');
					this.layersEl = document.getElementById('layers');
					this.previewEl = document.getElementById('preview');
					this.previewCanvas = document.getElementById('previewCanvas');

					this.octx = get2d(this.originalCanvas);
					this.sctx = get2d(this.simplifiedCanvas);
					this.opctx = get2d(this.originalPath);
					this.spctx = get2d(this.simplifiedPath);
				}

				setupEventListeners() {
					this.metaEl.textContent = `加载时间：${new Date().toLocaleString()}`;

					this.fileEl.addEventListener('change', () => {
						const file = this.fileEl.files && this.fileEl.files[0];
						if (!file) return;
						this.handleImageUpload(file);
					});

					this.btnClear.addEventListener('click', () => this.clearAll());
					this.btnGenerate.addEventListener('click', () => this.generate());
					this.btnBuildPcbArt.addEventListener('click', () => this.buildPcbArt());
					this.btnSaveAll.addEventListener('click', () => this.saveAll());

					this.toleranceEl.addEventListener('input', () => {
						this.currentTolerance = parseInt(this.toleranceEl.value, 10) || 0;
						this.toleranceValueEl.textContent = String(this.currentTolerance);
					});
					this.brushSizeOriginalEl.addEventListener('change', () => {
						this.brushSizeOriginal = Math.max(1, parseInt(this.brushSizeOriginalEl.value, 10) || 1);
						this.brushSizeOriginalEl.value = String(this.brushSizeOriginal);
					});
					this.brushSizeSimplifiedEl.addEventListener('change', () => {
						this.brushSizeSimplified = Math.max(1, parseInt(this.brushSizeSimplifiedEl.value, 10) || 1);
						this.brushSizeSimplifiedEl.value = String(this.brushSizeSimplified);
					});

					this.undoOriginalBtn.addEventListener('click', () => this.undoOriginal());
					this.resetOriginalBtn.addEventListener('click', () => this.resetOriginal());
					this.undoSimplifiedBtn.addEventListener('click', () => this.undoSimplified());
					this.resetSimplifiedBtn.addEventListener('click', () => this.resetSimplified());

					this.originalBrushBtn.addEventListener('click', () => this.setOriginalTool('brush'));
					this.originalLassoBtn.addEventListener('click', () => this.setOriginalTool('lasso'));
					this.originalFillBtn.addEventListener('click', () => this.setOriginalTool('fill'));
					this.simplifiedBrushBtn.addEventListener('click', () => this.setSimplifiedTool('brush'));
					this.simplifiedLassoBtn.addEventListener('click', () => this.setSimplifiedTool('lasso'));
					this.simplifiedFillBtn.addEventListener('click', () => this.setSimplifiedTool('fill'));

					document.querySelectorAll('input[name="scheme"]').forEach((el) => {
						el.addEventListener('change', () => {
							this.currentSchemeKey = el.value;
							this.currentColorScheme = COLOR_SCHEMES[this.currentSchemeKey];
							this.renderSchemePickers();
							if (this.image) this.initialProcessPCB();
						});
					});

					this.setupOriginalCanvasHandlers();
					this.setupSimplifiedCanvasHandlers();
				}

				showToast(msg) {
					if (this.toastTimer) clearTimeout(this.toastTimer);
					this.toastEl.textContent = msg;
					this.toastEl.classList.add('show');
					this.toastTimer = setTimeout(() => this.toastEl.classList.remove('show'), 1600);
				}

				renderSchemePickers() {
					this.schemeColorsEl.innerHTML = '';
					for (const [name, rgb] of Object.entries(this.currentColorScheme)) {
						const el = document.createElement('div');
						el.className = 'picker';
						el.style.background = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
						el.title = name;
						this.schemeColorsEl.appendChild(el);
					}
				}

				setupOriginalColorPicker() {
					this.availableColorsOriginalEl.innerHTML = '';
					for (const [name, color] of Object.entries(REPLACE_COLORS)) {
						const el = document.createElement('div');
						el.className = 'picker';
						el.style.background = `rgb(${color[0]},${color[1]},${color[2]})`;
						el.title = name;
						el.addEventListener('click', () => {
							this.availableColorsOriginalEl.querySelectorAll('.picker').forEach((n) => n.classList.remove('selected'));
							el.classList.add('selected');
							this.selectedOriginalColor = color;
						});
						this.availableColorsOriginalEl.appendChild(el);
					}
				}

				setupSimplifiedColorPicker() {
					this.availableColorsSimplifiedEl.innerHTML = '';
					for (const [name, color] of Object.entries(this.currentColorScheme)) {
						const el = document.createElement('div');
						el.className = 'picker';
						el.style.background = `rgb(${color[0]},${color[1]},${color[2]})`;
						el.title = name;
						el.addEventListener('click', () => {
							this.availableColorsSimplifiedEl.querySelectorAll('.picker').forEach((n) => n.classList.remove('selected'));
							el.classList.add('selected');
							this.selectedSimplifiedColor = name;
						});
						this.availableColorsSimplifiedEl.appendChild(el);

				applyToolButtonState() {
					const setActive = (btn, active) => {
						btn.classList.toggle('ok', active);
						btn.classList.toggle('secondary', !active);
					};
					setActive(this.originalBrushBtn, this.originalTool === 'brush');
					setActive(this.originalLassoBtn, this.originalTool === 'lasso');
					setActive(this.originalFillBtn, this.originalTool === 'fill');
					setActive(this.simplifiedBrushBtn, this.simplifiedTool === 'brush');
					setActive(this.simplifiedLassoBtn, this.simplifiedTool === 'lasso');
					setActive(this.simplifiedFillBtn, this.simplifiedTool === 'fill');
				}

				setOriginalTool(tool) {
					this.originalTool = tool;
					this.applyToolButtonState();
				}

				setSimplifiedTool(tool) {
					this.simplifiedTool = tool;
					this.applyToolButtonState();
				}

				clearAll() {
					this.image = null;
					this.originalBaseImage = null;
					this.simplifiedImageData = null;
					this.originalEditHistory = [];
					this.simplifiedEditHistory = [];
					this.maskList = [];
					this.selectedSimplifiedColor = null;
					this.imgInfoEl.textContent = '';
					this.maskInfoEl.textContent = '';
					this.layerInfoEl.textContent = '';
					this.previewInfoEl.textContent = '';
					this.masksEl.innerHTML = '';
					this.layersEl.innerHTML = '';
					this.previewEl.innerHTML = '';
					this.btnGenerate.disabled = true;
					this.btnSaveAll.disabled = true;
					this.undoOriginalBtn.disabled = true;
					this.resetOriginalBtn.disabled = true;
					this.undoSimplifiedBtn.disabled = true;
					this.resetSimplifiedBtn.disabled = true;
					this.octx.clearRect(0, 0, this.originalCanvas.width, this.originalCanvas.height);
					this.sctx.clearRect(0, 0, this.simplifiedCanvas.width, this.simplifiedCanvas.height);
					this.opctx.clearRect(0, 0, this.originalPath.width, this.originalPath.height);
					this.spctx.clearRect(0, 0, this.simplifiedPath.width, this.simplifiedPath.height);
				}

				async handleImageUpload(file) {
					if (!file.type.startsWith('image/')) {
						this.showToast('请上传有效的图像文件');
						return;
					}
					this.showToast(`正在读取：${file.name}`);
					const reader = new FileReader();
					reader.onload = () => {
						const img = new Image();
						img.onload = () => {
							const maxSide = 1500;
							const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
							const w = Math.max(1, Math.round(img.width * scale));
							const h = Math.max(1, Math.round(img.height * scale));

							const temp = document.createElement('canvas');
							temp.width = w;
							temp.height = h;
							const tctx = temp.getContext('2d', { willReadFrequently: true });
							tctx.drawImage(img, 0, 0, w, h);

							this.originalCanvas.width = w;
							this.originalCanvas.height = h;
							this.simplifiedCanvas.width = w;
							this.simplifiedCanvas.height = h;
							this.originalPath.width = w;
							this.originalPath.height = h;
							this.simplifiedPath.width = w;
							this.simplifiedPath.height = h;

							this.octx.drawImage(temp, 0, 0);
							this.image = img;
							this.originalBaseImage = temp;
							this.imgInfoEl.textContent = `尺寸：${w}×${h}`;
							this.btnGenerate.disabled = false;
							this.btnSaveAll.disabled = true;
							this.resetOriginalBtn.disabled = false;
							this.resetSimplifiedBtn.disabled = false;
							this.showToast('图片已载入');
							this.initialProcessPCB();
						};
						img.src = reader.result;
					};
					reader.onerror = () => this.showToast('读取文件失败');
					reader.readAsDataURL(file);
				}

				initialProcessPCB() {
					const w = this.originalCanvas.width;
					const h = this.originalCanvas.height;
					if (!w || !h) return;
					const data = this.octx.getImageData(0, 0, w, h);
					this.simplifiedImageData = this.sctx.createImageData(w, h);
					for (let i = 0; i < data.data.length; i += 4) {
						const pixel = [data.data[i], data.data[i + 1], data.data[i + 2]];
						let closest = '白色';
						let minDist = Infinity;
						for (const [name, color] of Object.entries(this.currentColorScheme)) {
							const d = Math.hypot(color[0] - pixel[0], color[1] - pixel[1], color[2] - pixel[2]);
							if (d < minDist) {
								minDist = d;
								closest = name;
							}
						}
						const mapped = this.currentColorScheme[closest];
						this.simplifiedImageData.data.set([mapped[0], mapped[1], mapped[2], 255], i);
					}
					this.sctx.putImageData(this.simplifiedImageData, 0, 0);
					this.setupSimplifiedColorPicker();
					this.showToast('简化图已生成');
					this.undoOriginalBtn.disabled = this.originalEditHistory.length === 0;
					this.undoSimplifiedBtn.disabled = this.simplifiedEditHistory.length === 0;
				}

				setupOriginalCanvasHandlers() {
					this.originalCanvas.addEventListener('mousedown', (e) => {
						if (!this.originalCanvas.width) return;
						if (!this.selectedOriginalColor) {
							this.showToast('请先选择要替换成的颜色');
							return;
						}
						const rect = this.originalCanvas.getBoundingClientRect();
						const x = Math.floor((e.clientX - rect.left) * (this.originalCanvas.width / rect.width));
						const y = Math.floor((e.clientY - rect.top) * (this.originalCanvas.height / rect.height));
						if (this.originalTool === 'lasso') {
							this.isDrawingLassoOriginal = true;
							this.lassoPointsOriginal = [[x, y]];
							this.opctx.clearRect(0, 0, this.originalPath.width, this.originalPath.height);
							this.opctx.strokeStyle = 'rgba(37, 99, 235, 0.8)';
							this.opctx.lineWidth = 2;
							this.opctx.beginPath();
							this.opctx.moveTo(x, y);
							this.opctx.lineTo(x, y);
							this.opctx.stroke();
							return;
						}
						this.saveOriginalCanvasState();
						if (this.originalTool === 'brush') this.modifyOriginalPixelArea(x, y);
						if (this.originalTool === 'fill') this.fillOriginalArea(x, y);
						this.initialProcessPCB();
					});

					this.originalCanvas.addEventListener('mousemove', (e) => {
						if (!this.isDrawingLassoOriginal) return;
						const rect = this.originalCanvas.getBoundingClientRect();
						const x = Math.floor((e.clientX - rect.left) * (this.originalCanvas.width / rect.width));
						const y = Math.floor((e.clientY - rect.top) * (this.originalCanvas.height / rect.height));
						this.lassoPointsOriginal.push([x, y]);
						this.opctx.clearRect(0, 0, this.originalPath.width, this.originalPath.height);
						this.opctx.strokeStyle = 'rgba(37, 99, 235, 0.8)';
						this.opctx.lineWidth = 2;
						this.opctx.beginPath();
						this.opctx.moveTo(this.lassoPointsOriginal[0][0], this.lassoPointsOriginal[0][1]);
						for (let i = 1; i < this.lassoPointsOriginal.length; i++) {
							this.opctx.lineTo(this.lassoPointsOriginal[i][0], this.lassoPointsOriginal[i][1]);
						}
						this.opctx.stroke();
					});

					this.originalCanvas.addEventListener('mouseup', () => {
						if (!this.isDrawingLassoOriginal) return;
						this.isDrawingLassoOriginal = false;
						if (this.lassoPointsOriginal.length > 2) {
							this.saveOriginalCanvasState();
							this.modifyOriginalLassoArea();
							this.initialProcessPCB();
						}
					});
				}

				setupSimplifiedCanvasHandlers() {
					this.simplifiedCanvas.addEventListener('mousedown', (e) => {
						if (!this.simplifiedCanvas.width || !this.simplifiedImageData) return;
						if (!this.selectedSimplifiedColor) {
							this.showToast('请先选择要替换成的颜色');
							return;
						}
						const rect = this.simplifiedCanvas.getBoundingClientRect();
						const x = Math.floor((e.clientX - rect.left) * (this.simplifiedCanvas.width / rect.width));
						const y = Math.floor((e.clientY - rect.top) * (this.simplifiedCanvas.height / rect.height));
						if (this.simplifiedTool === 'lasso') {
							this.isDrawingLassoSimplified = true;
							this.lassoPointsSimplified = [[x, y]];
							this.spctx.clearRect(0, 0, this.simplifiedPath.width, this.simplifiedPath.height);
							this.spctx.strokeStyle = 'rgba(37, 99, 235, 0.8)';
							this.spctx.lineWidth = 2;
							this.spctx.beginPath();
							this.spctx.moveTo(x, y);
							this.spctx.lineTo(x, y);
							this.spctx.stroke();
							return;
						}
						this.saveSimplifiedCanvasState();
						if (this.simplifiedTool === 'brush') this.modifySimplifiedPixelArea(x, y);
						if (this.simplifiedTool === 'fill') this.fillSimplifiedArea(x, y);
					});

					this.simplifiedCanvas.addEventListener('mousemove', (e) => {
						if (!this.isDrawingLassoSimplified) return;
						const rect = this.simplifiedCanvas.getBoundingClientRect();
						const x = Math.floor((e.clientX - rect.left) * (this.simplifiedCanvas.width / rect.width));
						const y = Math.floor((e.clientY - rect.top) * (this.simplifiedCanvas.height / rect.height));
						this.lassoPointsSimplified.push([x, y]);
						this.spctx.clearRect(0, 0, this.simplifiedPath.width, this.simplifiedPath.height);
						this.spctx.strokeStyle = 'rgba(37, 99, 235, 0.8)';
						this.spctx.lineWidth = 2;
						this.spctx.beginPath();
						this.spctx.moveTo(this.lassoPointsSimplified[0][0], this.lassoPointsSimplified[0][1]);
						for (let i = 1; i < this.lassoPointsSimplified.length; i++) {
							this.spctx.lineTo(this.lassoPointsSimplified[i][0], this.lassoPointsSimplified[i][1]);
						}
						this.spctx.stroke();
					});

					this.simplifiedCanvas.addEventListener('mouseup', () => {
						if (!this.isDrawingLassoSimplified) return;
						this.isDrawingLassoSimplified = false;
						if (this.lassoPointsSimplified.length > 2) {
							this.saveSimplifiedCanvasState();
							this.modifySimplifiedLassoArea();
						}
					});
				}

				modifyOriginalPixelArea(x, y) {
					const pixel = this.octx.getImageData(x, y, 1, 1).data;
					const target = [pixel[0], pixel[1], pixel[2]];
					const imageData = this.octx.getImageData(0, 0, this.originalCanvas.width, this.originalCanvas.height);
					const radius = Math.floor(this.brushSizeOriginal / 2);
					const startX = Math.max(0, x - radius);
					const startY = Math.max(0, y - radius);
					const endX = Math.min(this.originalCanvas.width, x + radius + 1);
					const endY = Math.min(this.originalCanvas.height, y + radius + 1);
					for (let py = startY; py < endY; py++) {
						for (let px = startX; px < endX; px++) {
							const i = (py * this.originalCanvas.width + px) * 4;
							const r = imageData.data[i];
							const g = imageData.data[i + 1];
							const b = imageData.data[i + 2];
							const d = Math.hypot(r - target[0], g - target[1], b - target[2]);
							if (d <= this.currentTolerance) {
								imageData.data[i] = this.selectedOriginalColor[0];
								imageData.data[i + 1] = this.selectedOriginalColor[1];
								imageData.data[i + 2] = this.selectedOriginalColor[2];
							}
						}
					}
					this.octx.putImageData(imageData, 0, 0);
				}

				modifyOriginalLassoArea() {
					if (this.lassoPointsOriginal.length < 3) return;
					const w = this.originalCanvas.width;
					const h = this.originalCanvas.height;
					const imageData = this.octx.getImageData(0, 0, w, h);
					const path = new Path2D();
					path.moveTo(this.lassoPointsOriginal[0][0], this.lassoPointsOriginal[0][1]);
					for (let i = 1; i < this.lassoPointsOriginal.length; i++) {
						path.lineTo(this.lassoPointsOriginal[i][0], this.lassoPointsOriginal[i][1]);
					}
					path.closePath();
					const temp = document.createElement('canvas');
					temp.width = w;
					temp.height = h;
					const tctx = temp.getContext('2d', { willReadFrequently: true });
					tctx.drawImage(this.originalCanvas, 0, 0);
					for (let y = 0; y < h; y++) {
						for (let x = 0; x < w; x++) {
							if (tctx.isPointInPath(path, x, y)) {
								const i = (y * w + x) * 4;
								imageData.data[i] = this.selectedOriginalColor[0];
								imageData.data[i + 1] = this.selectedOriginalColor[1];
								imageData.data[i + 2] = this.selectedOriginalColor[2];
							}
						}
					}
					this.octx.putImageData(imageData, 0, 0);
					this.opctx.clearRect(0, 0, this.originalPath.width, this.originalPath.height);
					this.lassoPointsOriginal = [];
				}

				fillOriginalArea(x, y) {
					const w = this.originalCanvas.width;
					const h = this.originalCanvas.height;
					const seed = this.octx.getImageData(x, y, 1, 1).data;
					const target = [seed[0], seed[1], seed[2]];
					if (
						this.selectedOriginalColor[0] === target[0] &&
						this.selectedOriginalColor[1] === target[1] &&
						this.selectedOriginalColor[2] === target[2]
					) {
						return;
					}
					const imageData = this.octx.getImageData(0, 0, w, h);
					const visited = new Uint8Array(w * h);
					const queue = new Int32Array(w * h * 2);
					let head = 0;
					let tail = 0;
					queue[tail++] = x;
					queue[tail++] = y;
					visited[y * w + x] = 1;

					while (head < tail) {
						const cx = queue[head++];
						const cy = queue[head++];
						const idx = (cy * w + cx) * 4;
						const r = imageData.data[idx];
						const g = imageData.data[idx + 1];
						const b = imageData.data[idx + 2];
						const d = Math.hypot(r - target[0], g - target[1], b - target[2]);
						if (d > this.currentTolerance) continue;
						imageData.data[idx] = this.selectedOriginalColor[0];
						imageData.data[idx + 1] = this.selectedOriginalColor[1];
						imageData.data[idx + 2] = this.selectedOriginalColor[2];

						if (cx > 0) {
							const k = cy * w + (cx - 1);
							if (!visited[k]) {
								visited[k] = 1;
								queue[tail++] = cx - 1;
								queue[tail++] = cy;
							}
						}
						if (cx < w - 1) {
							const k = cy * w + (cx + 1);
							if (!visited[k]) {
								visited[k] = 1;
								queue[tail++] = cx + 1;
								queue[tail++] = cy;
							}
						}
						if (cy > 0) {
							const k = (cy - 1) * w + cx;
							if (!visited[k]) {
								visited[k] = 1;
								queue[tail++] = cx;
								queue[tail++] = cy - 1;
							}
						}
						if (cy < h - 1) {
							const k = (cy + 1) * w + cx;
							if (!visited[k]) {
								visited[k] = 1;
								queue[tail++] = cx;
								queue[tail++] = cy + 1;
							}
						}
					}
					this.octx.putImageData(imageData, 0, 0);
				}

				saveOriginalCanvasState() {
					const w = this.originalCanvas.width;
					const h = this.originalCanvas.height;
					const imageData = this.octx.getImageData(0, 0, w, h);
					this.originalEditHistory.push(new ImageData(new Uint8ClampedArray(imageData.data), w, h));
					if (this.originalEditHistory.length > 30) this.originalEditHistory.shift();
					this.undoOriginalBtn.disabled = false;
				}

				undoOriginal() {
					if (this.originalEditHistory.length === 0) return;
					const prev = this.originalEditHistory.pop();
					this.octx.putImageData(prev, 0, 0);
					this.undoOriginalBtn.disabled = this.originalEditHistory.length === 0;
					this.initialProcessPCB();
				}

				resetOriginal() {
					if (!this.originalBaseImage) return;
					this.octx.clearRect(0, 0, this.originalCanvas.width, this.originalCanvas.height);
					this.octx.drawImage(this.originalBaseImage, 0, 0);
					this.originalEditHistory = [];
					this.undoOriginalBtn.disabled = true;
					this.initialProcessPCB();
				}

				modifySimplifiedPixelArea(x, y) {
					const pixel = this.sctx.getImageData(x, y, 1, 1).data;
					const newColor = this.currentColorScheme[this.selectedSimplifiedColor];
					const radius = Math.floor(this.brushSizeSimplified / 2);
					const startX = Math.max(0, x - radius);
					const startY = Math.max(0, y - radius);
					const endX = Math.min(this.simplifiedCanvas.width, x + radius + 1);
					const endY = Math.min(this.simplifiedCanvas.height, y + radius + 1);
					for (let py = startY; py < endY; py++) {
						for (let px = startX; px < endX; px++) {
							const i = (py * this.simplifiedCanvas.width + px) * 4;
							if (
								this.simplifiedImageData.data[i] === pixel[0] &&
								this.simplifiedImageData.data[i + 1] === pixel[1] &&
								this.simplifiedImageData.data[i + 2] === pixel[2]
							) {
								this.simplifiedImageData.data.set([newColor[0], newColor[1], newColor[2], 255], i);
							}
						}
					}
					this.sctx.putImageData(this.simplifiedImageData, 0, 0);
				}

				modifySimplifiedLassoArea() {
					if (this.lassoPointsSimplified.length < 3) return;
					const w = this.simplifiedCanvas.width;
					const h = this.simplifiedCanvas.height;
					const path = new Path2D();
					path.moveTo(this.lassoPointsSimplified[0][0], this.lassoPointsSimplified[0][1]);
					for (let i = 1; i < this.lassoPointsSimplified.length; i++) {
						path.lineTo(this.lassoPointsSimplified[i][0], this.lassoPointsSimplified[i][1]);
					}
					path.closePath();
					const temp = document.createElement('canvas');
					temp.width = w;
					temp.height = h;
					const tctx = temp.getContext('2d', { willReadFrequently: true });
					tctx.putImageData(this.simplifiedImageData, 0, 0);
					const newColor = this.currentColorScheme[this.selectedSimplifiedColor];
					for (let y = 0; y < h; y++) {
						for (let x = 0; x < w; x++) {
							if (tctx.isPointInPath(path, x, y)) {
								const i = (y * w + x) * 4;
								this.simplifiedImageData.data.set([newColor[0], newColor[1], newColor[2], 255], i);
							}
						}
					}
					this.sctx.putImageData(this.simplifiedImageData, 0, 0);
					this.spctx.clearRect(0, 0, this.simplifiedPath.width, this.simplifiedPath.height);
					this.lassoPointsSimplified = [];
				}

				fillSimplifiedArea(x, y) {
					const w = this.simplifiedCanvas.width;
					const h = this.simplifiedCanvas.height;
					const pixel = this.sctx.getImageData(x, y, 1, 1).data;
					const newColor = this.currentColorScheme[this.selectedSimplifiedColor];
					if (pixel[0] === newColor[0] && pixel[1] === newColor[1] && pixel[2] === newColor[2]) return;

					const visited = new Uint8Array(w * h);
					const queue = new Int32Array(w * h * 2);
					let head = 0;
					let tail = 0;
					queue[tail++] = x;
					queue[tail++] = y;
					visited[y * w + x] = 1;

					while (head < tail) {
						const cx = queue[head++];
						const cy = queue[head++];
						const i = (cy * w + cx) * 4;
						if (
							this.simplifiedImageData.data[i] !== pixel[0] ||
							this.simplifiedImageData.data[i + 1] !== pixel[1] ||
							this.simplifiedImageData.data[i + 2] !== pixel[2]
						) {
							continue;
						}
						this.simplifiedImageData.data.set([newColor[0], newColor[1], newColor[2], 255], i);

						if (cx > 0) {
							const k = cy * w + (cx - 1);
							if (!visited[k]) {
								visited[k] = 1;
								queue[tail++] = cx - 1;
								queue[tail++] = cy;
							}
						}
						if (cx < w - 1) {
							const k = cy * w + (cx + 1);
							if (!visited[k]) {
								visited[k] = 1;
								queue[tail++] = cx + 1;
								queue[tail++] = cy;
							}
						}
						if (cy > 0) {
							const k = (cy - 1) * w + cx;
							if (!visited[k]) {
								visited[k] = 1;
								queue[tail++] = cx;
								queue[tail++] = cy - 1;
							}
						}
						if (cy < h - 1) {
							const k = (cy + 1) * w + cx;
							if (!visited[k]) {
								visited[k] = 1;
								queue[tail++] = cx;
								queue[tail++] = cy + 1;
							}
						}
					}

					this.sctx.putImageData(this.simplifiedImageData, 0, 0);
				}

				saveSimplifiedCanvasState() {
					const w = this.simplifiedCanvas.width;
					const h = this.simplifiedCanvas.height;
					const imageData = this.sctx.getImageData(0, 0, w, h);
					this.simplifiedEditHistory.push(new ImageData(new Uint8ClampedArray(imageData.data), w, h));
					if (this.simplifiedEditHistory.length > 30) this.simplifiedEditHistory.shift();
					this.undoSimplifiedBtn.disabled = false;
				}

				undoSimplified() {
					if (this.simplifiedEditHistory.length === 0) return;
					const prev = this.simplifiedEditHistory.pop();
					this.simplifiedImageData = prev;
					this.sctx.putImageData(prev, 0, 0);
					this.undoSimplifiedBtn.disabled = this.simplifiedEditHistory.length === 0;
				}

				resetSimplified() {
					if (!this.image) return;
					this.simplifiedEditHistory = [];
					this.undoSimplifiedBtn.disabled = true;
					this.initialProcessPCB();
				}

				addCornerMarkers(ctx, w, h) {
					ctx.fillStyle = 'red';
					ctx.fillRect(0, 0, 1, 1);
					ctx.fillRect(w - 1, 0, 1, 1);
					ctx.fillRect(0, h - 1, 1, 1);
					ctx.fillRect(w - 1, h - 1, 1, 1);
				}

				generate() {
					if (!this.simplifiedCanvas.width || !this.simplifiedImageData) return;
					this.maskList = [];
					this.masksEl.innerHTML = '';
					this.layersEl.innerHTML = '';
					this.previewEl.innerHTML = '';

					const w = this.simplifiedCanvas.width;
					const h = this.simplifiedCanvas.height;
					const data = this.sctx.getImageData(0, 0, w, h);

					const buffers = {};
					for (const [name] of Object.entries(this.currentColorScheme)) {
						buffers[name] = new Uint8ClampedArray(w * h * 4);
					}

					for (let i = 0; i < data.data.length; i += 4) {
						const r = data.data[i];
						const g = data.data[i + 1];
						const b = data.data[i + 2];
						for (const [name, color] of Object.entries(this.currentColorScheme)) {
							if (r === color[0] && g === color[1] && b === color[2]) {
								buffers[name].set([color[0], color[1], color[2], 255], i);
								break;
							}
						}
					}

					for (const [name, buffer] of Object.entries(buffers)) {
						const canvas = document.createElement('canvas');
						canvas.width = w;
						canvas.height = h;
						const ctx = canvas.getContext('2d', { willReadFrequently: true });
						ctx.putImageData(new ImageData(buffer, w, h), 0, 0);
						this.addCornerMarkers(ctx, w, h);
						this.maskList.push({ name, canvas });
						this.masksEl.appendChild(this.createThumb(name, canvas));
					}

					this.generateLayers();
					this.generatePreview();
					this.btnSaveAll.disabled = false;
					this.btnBuildPcbArt.disabled = false;
					this.maskInfoEl.textContent = `共 ${Object.keys(buffers).length} 张`;
					this.layerInfoEl.textContent = '';
					this.previewInfoEl.textContent = '';
					this.showToast('生成完成');
				}

				createThumb(name, canvas) {
					const item = document.createElement('div');
					item.className = 'thumb';
					const img = document.createElement('img');
					img.alt = name;
					img.src = canvas.toDataURL('image/png');
					item.title = name;
					item.appendChild(img);
					item.addEventListener('click', () => {
						if (item.dataset.busy === '1') return;
						item.dataset.busy = '1';
						item.style.pointerEvents = 'none';
						void this.saveSingle(name, canvas).finally(() => {
							setTimeout(() => {
								item.dataset.busy = '0';
								item.style.pointerEvents = '';
							}, 400);
						});
					});
					return item;
				}

				async saveSingle(name, canvas) {
					const rename = RENAME_MAP[name] || name;
					const prefix = (this.exportPrefixEl.value || '').trim();
					const fileName = prefix ? `${prefix}_${rename}.png` : `${rename}.png`;
					const blob = await canvasToBlob(canvas, 'image/png');
					saveFileToHost(blob, fileName);
					this.showToast(`已请求保存：${fileName}`);
				}

				generateLayers() {
					const w = this.simplifiedCanvas.width;
					const h = this.simplifiedCanvas.height;

					const combine = (names) => {
						const canvas = document.createElement('canvas');
						canvas.width = w;
						canvas.height = h;
						const ctx = canvas.getContext('2d', { willReadFrequently: true });
						names.forEach((n) => {
							const m = this.maskList.find((m) => m.name === n);
							if (m) ctx.drawImage(m.canvas, 0, 0);
						});
						return canvas;
					};

					const layers = {
						'正面阻焊层': combine(['深绿', '浅绿', '黑色']),
						'正面铜皮层': combine(['浅蓝', '黑色']),
						'背面阻焊层': combine(['浅绿']),
					};

					if (this.currentColorScheme === COLOR_SCHEMES.red) layers['正面铜皮层'] = combine(['浅红', '黑色']);
					if (this.currentColorScheme === COLOR_SCHEMES.purple) layers['正面铜皮层'] = combine(['浅紫', '黑色']);

					for (const [layerName, canvas] of Object.entries(layers)) {
						this.maskList.push({ name: layerName, canvas });
						this.layersEl.appendChild(this.createThumb(layerName, canvas));
					}
					this.layerInfoEl.textContent = `共 ${Object.keys(layers).length} 张`;
				}

				generatePreview() {
					const w = this.simplifiedCanvas.width;
					const h = this.simplifiedCanvas.height;
					const data = this.sctx.getImageData(0, 0, w, h);
					this.previewCanvas.width = w;
					this.previewCanvas.height = h;
					const pctx = this.previewCanvas.getContext('2d', { willReadFrequently: true });
					const out = pctx.createImageData(w, h);
					for (let i = 0; i < data.data.length; i += 4) {
						if (data.data[i] === 6 && data.data[i + 1] === 16 && data.data[i + 2] === 8) {
							out.data[i] = 160;
							out.data[i + 1] = 160;
							out.data[i + 2] = 160;
							out.data[i + 3] = 255;
						} else {
							out.data[i] = data.data[i];
							out.data[i + 1] = data.data[i + 1];
							out.data[i + 2] = data.data[i + 2];
							out.data[i + 3] = 255;
						}
					}
					pctx.putImageData(out, 0, 0);
					this.maskList.push({ name: '实物预览图', canvas: this.previewCanvas });
					this.previewEl.appendChild(this.createThumb('实物预览图', this.previewCanvas));
					this.previewInfoEl.textContent = '共 1 张';
				}

				async saveAll() {
					if (!this.maskList.length) return;
					const prefix = (this.exportPrefixEl.value || '').trim();
					this.showToast('正在打包ZIP...');
					const files = [];
					for (const item of this.maskList) {
						const rename = RENAME_MAP[item.name] || item.name;
						const fileName = `${rename}.png`;
						const blob = await canvasToBlob(item.canvas, 'image/png');
						if (blob) files.push({ fileName, blob });
					}
					const blobOriginal = await canvasToBlob(this.originalCanvas, 'image/png');
					if (blobOriginal) files.push({ fileName: '原图.png', blob: blobOriginal });
					const blobSimplified = await canvasToBlob(this.simplifiedCanvas, 'image/png');
					if (blobSimplified) files.push({ fileName: '简化图.png', blob: blobSimplified });

					const zipNameBase = prefix || 'pcb灯光画';
					saveZipToHost(`${zipNameBase}.zip`, files);
					this.showToast('已请求ZIP导出');
				}

				async buildPcbArt() {
					if (!this.maskList.length) {
						this.showToast('请先生成遮罩/图层');
						return;
					}
					const boardWidthMm = parseFloat(String(this.pcbWmmEl.value || ''));
					const boardHeightMm = parseFloat(String(this.pcbHmmEl.value || ''));
					if (!Number.isFinite(boardWidthMm) || !Number.isFinite(boardHeightMm) || boardWidthMm <= 0 || boardHeightMm <= 0) {
						this.showToast('请填写有效的板框尺寸（mm）');
						return;
					}

					const candidates = [
						{ name: '正面铜皮层', layer: 'TOP', horizonMirror: false },
						{ name: '正面阻焊层', layer: 'TOP_SOLDER_MASK', horizonMirror: false },
						{ name: '白色', layer: 'TOP_SILKSCREEN', horizonMirror: false },
						{
							name: this.currentSchemeKey === 'red' ? '深红' : this.currentSchemeKey === 'purple' ? '深紫' : '深蓝',
							layer: 'BOTTOM',
							horizonMirror: true,
						},
						{ name: '背面阻焊层', layer: 'BOTTOM_SOLDER_MASK', horizonMirror: true },
					];

					const autoDeborderRect =
						AUTO_DEBORDER_TRIAL.enabled === true
							? detectAutoDeborderRect(this.simplifiedCanvas, this.currentSchemeKey, AUTO_DEBORDER_TRIAL)
							: null;
					if (autoDeborderRect) {
						this.showToast(
							`试验去边框：上${autoDeborderRect.top}px 下${autoDeborderRect.bottom}px 左${autoDeborderRect.left}px 右${autoDeborderRect.right}px`,
						);
					}

					const layers = [];
					for (const c of candidates) {
						const item = this.maskList.find((m) => m.name === c.name);
						if (!item?.canvas) continue;
						const sourceCanvas = autoDeborderRect ? cropCanvasByRect(item.canvas, autoDeborderRect) : item.canvas;
						const binary = toBinaryMaskCanvas(sourceCanvas);
						const scaled = scaleCanvasToMaxSide(binary, BUILD_PCB_ART_MAX_SIDE_TRIAL);
						const blob = await canvasToBlob(scaled.canvas, 'image/png');
						if (!blob) continue;
						layers.push({
							name: c.name,
							layer: c.layer,
							horizonMirror: c.horizonMirror,
							imageWidth: scaled.width,
							imageHeight: scaled.height,
							blob,
						});
					}

					if (!layers.length) {
						this.showToast('未找到可用于生成PCB画的图层');
						return;
					}

					this.showToast('已请求生成PCB画...');
					requestBuildPcbArtToHost({ boardWidthMm, boardHeightMm, layers });
				}
			}

			const toastEl = document.getElementById('toast');
			const showFatal = (msg) => {
				if (!toastEl) return;
				toastEl.textContent = msg;
				toastEl.classList.add('show');
			};
			window.addEventListener('error', (e) => showFatal(`脚本错误：${e.message || e.type}`));
			window.addEventListener('unhandledrejection', (e) => showFatal(`未处理异常：${String(e.reason)}`));

			try {
				new PCBImageProcessor();
			} catch (e) {
				showFatal(`初始化失败：${String(e)}`);
			}
		</script>
	</body>
</html>
